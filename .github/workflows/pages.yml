name: Deploy Apollo Studio to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build production bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        env:
          # Works for both user/org sites (OWNER.github.io) and project sites
          # (OWNER.github.io/REPO). Vite's `base: "./"` makes asset URLs
          # relative so either layout renders correctly without rewriting.
          NODE_ENV: production
        run: npm run build

      - name: Fix SPA fallback
        # GitHub Pages serves 404.html for unknown paths. For a single-page
        # app that only has one entry, copy index.html so deep links still
        # hit the React router.
        run: cp dist/index.html dist/404.html

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Publish to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
